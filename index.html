<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Pokédex</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pokédex</h1>
        
        <div class="filters-container">
            <input type="text" id="pokemon-search" placeholder="Busque por nome ou ID...">
            <select id="type-filter">
                <option value="all">Todos os Tipos</option>
                <option value="fire">🔥 Fogo</option>
                <option value="water">💧 Água</option>
                <option value="grass">🌿 Grama</option>
                <option value="electric">⚡ Elétrico</option>
                <option value="ice">❄️ Gelo</option>
                <option value="fighting">👊 Lutador</option>
                <option value="poison">☠️ Venenoso</option>
                <option value="ground">🌍 Terra</option>
                <option value="flying">🕊️ Voador</option>
                <option value="psychic">🔮 Psíquico</option>
                <option value="bug">🐞 Inseto</option>
                <option value="rock">🧱 Pedra</option>
                <option value="ghost">👻 Fantasma</option>
                <option value="dragon">🐲 Dragão</option>
                <option value="normal">⚪ Normal</option>
                <option value="dark">⚫ Sombrio</option>
                <option value="fairy">🧚‍♀️ Fada</option>
                <option value="steel">🧲 Metal</option>
            </select>
        </div>

        <ul id="pokedex-list"></ul>

        <div class="pagination-controls">
            <button id="prev-btn">Anterior</button>
            <span id="page-number">Página 1</span>
            <button id="next-btn">Próximo</button>
        </div>
    </div>

    <div id="pokedex-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
